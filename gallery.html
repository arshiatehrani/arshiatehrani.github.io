    <!-- Apply saved theme BEFORE CSS loads to avoid a flash -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('site-theme');
                var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
                var theme = (saved === 'light' || saved === 'dark') ? saved : (prefersLight ? 'light' : 'dark');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
        })();
    </script>

    <!-- ==================== LIGHTBOX (built-in, no library) ==================== -->
    <div class="lightbox" id="lightbox" hidden>
        <button class="lightbox-close" aria-label="Close"><i class="fas fa-xmark"></i></button>
        <button class="lightbox-prev" aria-label="Previous"><i class="fas fa-chevron-left"></i></button>
        <button class="lightbox-next" aria-label="Next"><i class="fas fa-chevron-right"></i></button>
        <figure class="lightbox-figure">
            <img class="lightbox-img" alt="" />
            <figcaption class="lightbox-caption"></figcaption>
        </figure>
    </div>

    <script>
        /* ============================================================
           GALLERY: filter + lightbox
           ============================================================ */
        (function () {
            'use strict';

            const photos = Array.from(document.querySelectorAll('.photo'));
            const filters = document.querySelectorAll('.gallery-filter');
            const lb = document.getElementById('lightbox');
            const lbImg = lb.querySelector('.lightbox-img');
            const lbCap = lb.querySelector('.lightbox-caption');

            let visiblePhotos = photos.slice();
            let currentIndex = 0;

            /* ---------- Filtering ---------- */
            filters.forEach((btn) => {
                btn.addEventListener('click', () => {
                    filters.forEach((b) => b.classList.remove('active'));
                    btn.classList.add('active');
                    const f = btn.dataset.filter;
                    photos.forEach((p) => {
                        const show = f === 'all' || p.dataset.category === f;
                        p.classList.toggle('hidden', !show);
                    });
                    visiblePhotos = photos.filter((p) => !p.classList.contains('hidden'));
                });
            });

            let originalScrollPos = 0;

             /* ---------- Lightbox open / nav ---------- */
            function open(index) {
                if (visiblePhotos.length === 0) return;
                
                // Track scroll position before opening (only if lightbox is currently hidden)
                if (lb.hidden) {
                    originalScrollPos = window.scrollY;
                }

                currentIndex = (index + visiblePhotos.length) % visiblePhotos.length;
                const p = visiblePhotos[currentIndex];
                lbImg.src = p.dataset.full || p.querySelector('img').src;
                lbImg.alt = p.querySelector('h3') ? p.querySelector('h3').textContent : '';
                lbCap.textContent = p.dataset.caption || '';
                lb.hidden = false;
                
                // Scroll to top to show absolute lightbox
                window.scrollTo(0, 0);

                // Preload next and prev images
                if (visiblePhotos.length > 1) {
                    const nextPhoto = visiblePhotos[(currentIndex + 1) % visiblePhotos.length];
                    const prevPhoto = visiblePhotos[(currentIndex - 1 + visiblePhotos.length) % visiblePhotos.length];
                    const nextImgUrl = nextPhoto.dataset.full || nextPhoto.querySelector('img').src;
                    const prevImgUrl = prevPhoto.dataset.full || prevPhoto.querySelector('img').src;
                    
                    const imgPreloadNext = new Image();
                    imgPreloadNext.src = nextImgUrl;
                    const imgPreloadPrev = new Image();
                    imgPreloadPrev.src = prevImgUrl;
                }

                // Physically reorder DOM nodes in .masonry:
                // The photo after current comes first, then wraps around.
                // The current photo is appended LAST (hidden) so nth-child rules apply correctly.
                const masonry = document.querySelector('.masonry');
                
                // Build the reordered array: [currentIndex+1 ... end, 0 ... currentIndex-1]
                const reordered = [];
                for (let i = 1; i < visiblePhotos.length; i++) {
                    reordered.push(visiblePhotos[(currentIndex + i) % visiblePhotos.length]);
                }

                // First, restore all photos to visible
                visiblePhotos.forEach((photo) => {
                    photo.classList.remove('hidden');
                    photo.style.display = '';
                });

                // Append reordered visible photos
                reordered.forEach((photo) => {
                    masonry.appendChild(photo);
                });

                // Append the current photo last and hide it
                p.classList.add('hidden');
                masonry.appendChild(p);
            }

            function close() {
                lb.hidden = true;
                
                // Restore scroll position instantly
                const htmlEl = document.documentElement;
                const prevScrollBehavior = htmlEl.style.scrollBehavior;
                htmlEl.style.scrollBehavior = 'auto';
                
                window.scrollTo(0, originalScrollPos);
                
                void htmlEl.offsetHeight;
                htmlEl.style.scrollBehavior = prevScrollBehavior;

                // Restore original DOM order and visibility
                const masonry = document.querySelector('.masonry');
                visiblePhotos.forEach((photo) => {
                    photo.classList.remove('hidden');
                    photo.style.display = '';
                    masonry.appendChild(photo);
                });
            }

            photos.forEach((p) => {
                p.addEventListener('click', () => {
                    if (p.classList.contains('photo-empty')) return;     // skip missing images
                    open(visiblePhotos.indexOf(p));
                });
            });

            lb.querySelector('.lightbox-close').addEventListener('click', close);
            lb.querySelector('.lightbox-prev').addEventListener('click', () => open(currentIndex - 1));
            lb.querySelector('.lightbox-next').addEventListener('click', () => open(currentIndex + 1));

            // Click outside the figure closes the lightbox
            lb.addEventListener('click', (e) => {
                if (e.target === lb) close();
            });

            // Keyboard nav
            document.addEventListener('keydown', (e) => {
                if (lb.hidden) return;
                if (e.key === 'Escape') close();
                else if (e.key === 'ArrowRight') open(currentIndex + 1);
                else if (e.key === 'ArrowLeft') open(currentIndex - 1);
            });
        })();
    </script>
</body>
</html>
